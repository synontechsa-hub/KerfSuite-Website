 <g id="Layer_x0020_1">
  <metadata id="CorelCorpID_0Corel-Layer"/>
  <text x="39" y="531" id="hero_text" fill="white" font-weight="normal" font-size="14.5831px" font-family="Orbitron">A growing ecosystem of integrated workshop utilities designed to bridge the</text>
  <text x="39" y="556" id="hero_text" fill="white" font-weight="normal" font-size="14.5831px" font-family="Orbitron">gap between design and physical output. From algorithmic cut optimization to</text>
  <text x="39" y="581" id="hero_text" fill="white" font-weight="normal" font-size="14.5831px" font-family="Orbitron">real-time stock management, KerfSuite is built for serious makers who</text>
  <text x="39" y="606" id="hero_text" fill="white" font-weight="normal" font-size="14.5831px" font-family="Orbitron">demand zero-defect workflows.</text>
 </g>
</svg>
