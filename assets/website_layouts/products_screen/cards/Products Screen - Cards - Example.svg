   <rect fill="#333333" stroke="#FF6600" stroke-width="2.36221" width="250" height="160"/>
   <g>
    <text x="9" y="70" id="hero_text" fill="white" font-weight="normal" font-size="12.4996px" font-family="Orbitron">KerfCut is built for CNC flatbeds,</text>
    <text x="9" y="86" id="hero_text" fill="white" font-weight="normal" font-size="12.4996px" font-family="Orbitron">guillotines, and cut-off saws. Its</text>
    <text x="9" y="101" id="hero_text" fill="white" font-weight="normal" font-size="12.4996px" font-family="Orbitron">optimized cut layouts minimize</text>
    <text x="9" y="117" id="hero_text" fill="white" font-weight="normal" font-size="12.4996px" font-family="Orbitron">material waste so your operators</text>
    <text x="9" y="133" id="hero_text" fill="white" font-weight="normal" font-size="12.4996px" font-family="Orbitron">can stop doing mental maths and</text>
    <text x="9" y="148" id="hero_text" fill="white" font-weight="normal" font-size="12.4996px" font-family="Orbitron">get back to cutting.</text>
